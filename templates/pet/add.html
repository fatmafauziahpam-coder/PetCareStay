<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tambah Hewan</title>

<style>

body{
    font-family:Arial;
    background:#f589a1;
    padding:40px;
}

.container{
    width:650px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
}

h2{
    text-align:center;
    color:#94B17A;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

.button{
    display:flex;
    justify-content:space-between;
    margin-top:25px;
}

button{
    background:#94B17A;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
}

a{
    background:#999;
    color:white;
    text-decoration:none;
    padding:12px 25px;
    border-radius:8px;
}

</style>

</head>
<body>

<div class="container">

<h2>Tambah Data Hewan</h2>

<form method="POST">

<label>Nama Hewan</label>
<input type="text" name="name" required>

<label>Jenis Hewan</label>
<input type="text" name="species" placeholder="Kucing / Anjing">

<label>Ras</label>
<input type="text" name="breed">

<label>Umur</label>
<input type="number" name="age">

<label>Jenis Kelamin</label>
<select name="gender">
    <option>Jantan</option>
    <option>Betina</option>
</select>

<label>Berat (Kg)</label>
<input type="number" step="0.1" name="weight">

<label>Pemilik</label>

<select name="owner_id">

{% for owner in owners %}

<option value="{{ owner.id }}">
{{ owner.name }}
</option>

{% endfor %}

</select>

<div class="button">

<a href="{{ url_for('pets') }}">
Kembali
</a>

<button type="submit">
Simpan
</button>

</div>

</form>

</div>

</body>
</html>
