<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Booking</title>

<style>
body{
    font-family:Arial;
    background:#f589a1;
    padding:40px;
}

.container{
    width:650px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
}

h2{
    text-align:center;
    color:#94B17A;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

textarea{
    height:100px;
    resize:none;
}

.button{
    display:flex;
    justify-content:space-between;
    margin-top:25px;
}

button{
    background:#94B17A;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
}

a{
    background:#999;
    color:white;
    text-decoration:none;
    padding:12px 25px;
    border-radius:8px;
}
</style>

</head>

<body>

<div class="container">

<h2>Edit Booking</h2>

<form method="POST">

<label>Hewan</label>

<select name="pet_id">

{% for pet in pets %}

<option value="{{ pet.id }}"
{% if pet.id == booking.pet_id %}selected{% endif %}>
{{ pet.name }}
</option>

{% endfor %}

</select>

<label>Check In</label>

<input
type="date"
name="check_in"
value="{{ booking.check_in.strftime('%Y-%m-%d') }}"
required>

<label>Check Out</label>

<input
type="date"
name="check_out"
value="{{ booking.check_out.strftime('%Y-%m-%d') }}"
required>

<label>Tipe Kandang</label>

<select name="room_type">

<option value="Reguler" {% if booking.room_type=="Reguler" %}selected{% endif %}>Reguler</option>

<option value="VIP" {% if booking.room_type=="VIP" %}selected{% endif %}>VIP</option>

<option value="Deluxe" {% if booking.room_type=="Deluxe" %}selected{% endif %}>Deluxe</option>

</select>

<label>Catatan</label>

<textarea name="note">{{ booking.note }}</textarea>

<label>Status</label>

<select name="status">

<option value="Menunggu" {% if booking.status=="Menunggu" %}selected{% endif %}>Menunggu</option>

<option value="Berlangsung" {% if booking.status=="Berlangsung" %}selected{% endif %}>Berlangsung</option>

<option value="Selesai" {% if booking.status=="Selesai" %}selected{% endif %}>Selesai</option>

</select>

<div class="button">

<a href="{{ url_for('bookings') }}">
Kembali
</a>

<button type="submit">
Update
</button>

</div>

</form>

</div>

</body>
</html>
