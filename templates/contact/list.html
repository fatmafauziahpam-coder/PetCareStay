<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Kontak</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    background:#f589a1;
}

.sidebar{
    width:250px;
    height:100vh;
    background:#94B17A;
    padding:40px;
    position:fixed;
}

.sidebar h2{
    color:white;
    margin-bottom:50px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin:25px 0;
    font-size:20px;
}

.content{
    margin-left:250px;
    width:100%;
    padding:50px;
}

.top{
    display:flex;
    justify-content:space-between;
    margin-bottom:30px;
}

.top h1{
    color:white;
    font-size:50px;
}

.btn{
    background:#94B17A;
    color:white;
    text-decoration:none;
    padding:15px 25px;
    border-radius:10px;
}

table{
    width:100%;
    background:white;
    border-collapse:collapse;
}

th{
    background:#d9e7d1;
    padding:15px;
}

td{
    padding:15px;
    border-top:1px solid #ddd;
}

.edit{
    background:#ffc107;
    color:black;
    padding:8px 15px;
    text-decoration:none;
    border-radius:6px;
}

.delete{
    background:#dc3545;
    color:white;
    padding:8px 15px;
    text-decoration:none;
    border-radius:6px;
}
</style>

</head>

<body>

<div class="sidebar">
<h2>🐾 PetCareStay</h2>

<a href="/dashboard">Dashboard</a>

<a href="/owners">Pemilik</a>

<a href="/pets">Hewan</a>

<a href="/bookings">Booking</a>

<a href="/contacts">Kontak</a>

<a href="/">Logout</a>

</div>

<div class="content">

<div class="top">
<h1>Data Kontak</h1>

<a class="btn" href="/contacts/add">
+ Tambah Kontak
</a>

</div>

<table>

<tr>
<th>No</th>
<th>Nama</th>
<th>Email</th>
<th>Pesan</th>
<th>Aksi</th>
</tr>

{% for contact in contacts %}

<tr>

<td>{{ loop.index }}</td>

<td>{{ contact.name }}</td>

<td>{{ contact.email }}</td>

<td>{{ contact.message }}</td>

<td>

<a class="edit"
href="/contacts/edit/{{ contact.id }}">
Edit
</a>

<a class="delete"
href="/contacts/delete/{{ contact.id }}"
onclick="return confirm('Yakin hapus data?')">
Hapus
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
